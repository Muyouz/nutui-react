name: Release 3.x

on:
  push:
    tags:
      - v3.*
  workflow_dispatch:

jobs:
  release-3x:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        run: npm i -g pnpm@10

      - uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Build
        if: env.ABORT != 'true'
        run: |
          if ! pnpm build; then
            echo "构建 nutui-react 失败"
            exit 1
          fi
          if ! pnpm build:taro; then
            echo "构建 nutui-react-taro 失败"
            exit 1
          fi

      - name: Run Release @nutui/nutui-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: env.ABORT != 'true'
        run: pnpm --dir ./release/h5 publish

      - name: Run Releases @nutui/nutui-react-taro
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: env.ABORT != 'true'
        run: pnpm --dir ./release/taro publish
